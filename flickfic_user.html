<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FlickFic — User</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#080809;--accent:#c8a96e;--muted:rgba(255,255,255,0.38);--text:#ece9e2;}
    body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;}
    #grain{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.035;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px;animation:g .5s steps(3) infinite;}
    @keyframes g{0%{background-position:0 0}33%{background-position:60px 40px}66%{background-position:-40px 80px}}
    nav{display:flex;align-items:center;gap:48px;padding:22px 52px;position:relative;z-index:50;}
    .logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:8px;color:var(--accent);text-transform:uppercase;}
    .back{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;}
    .back:hover{color:#fff;}
    .wrap{padding:40px 52px;max-width:980px;}
    .title{font-size:44px;font-weight:300;letter-spacing:.04em;margin-bottom:14px;}
    .hint{font-size:14px;color:var(--muted);line-height:1.9;letter-spacing:.02em;max-width:72ch;margin-bottom:18px;}
    .panel{padding:18px;background:rgba(255,255,255,0.02);border:0.5px solid rgba(255,255,255,0.08);border-radius:2px;}
    .row{display:flex;gap:14px;align-items:center;margin-bottom:12px;}
    .av{width:48px;height:48px;border-radius:50%;border:0.5px solid rgba(200,169,110,0.35);background:rgba(200,169,110,0.15);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:var(--accent);font-size:12px;font-weight:700;}
    .name{font-size:18px;font-weight:300;letter-spacing:.03em;}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
    .tab{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:1px;text-transform:uppercase;padding:7px 10px;border:0.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.25);background:transparent;border-radius:1px;cursor:pointer;}
    .tab.on{border-color:rgba(200,169,110,0.4);color:var(--accent);background:rgba(200,169,110,0.07);}
    .list{margin-top:14px;color:rgba(255,255,255,0.55);font-size:14px;line-height:1.8;}
  </style>
</head>
<body>
<div id="grain"></div>
<nav>
  <div class="logo">FlickFic</div>
  <div class="back" onclick="location.href='flickfic_home_v2.html'">← Home</div>
</nav>
<div class="wrap">
  <div class="title">User Center</div>
  <div class="hint">Demo 占位：后续实现我的 Collect / 互动 / 发布内容。这里先给出一个 UI 骨架。</div>
  <div class="panel">
    <div class="row">
      <div class="av">R</div>
      <div>
        <div class="name">Reader R</div>
        <div style="font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-top:4px;">@reader_r</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab on" onclick="setTab(this,'collect')">My Collect</div>
      <div class="tab" onclick="setTab(this,'interact')">My Interactions</div>
      <div class="tab" onclick="setTab(this,'post')">My Posts</div>
    </div>
    <div class="list" id="list">demo: collect list will render here.</div>
  </div>
</div>
<script>
  function setTab(el,key){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    el.classList.add('on');
    const map = {
      collect: 'demo: collect list will render here.',
      interact: 'demo: likes/replies/highlights list will render here.',
      post: 'demo: uploads will render here.'
    };
    document.getElementById('list').textContent = map[key] || '—';
  }
</script>
</body>
</html>
